name: san2
description: "App de pre-venta Farmacia Santidad — pedidos, stock por sucursal y sucursales en mapa."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Estado (MVVM)
  provider: ^6.1.5

  # Red y configuración
  http: ^1.5.0
  flutter_dotenv: ^6.0.0
  shared_preferences: ^2.5.3

  # Mapa Leaflet (WebView con Leaflet 1.9.4 + OpenStreetMap)
  webview_flutter: ^4.13.0

  # Utilidades
  url_launcher: ^6.3.2
  intl: ^0.20.2
  google_fonts: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - .env.production
