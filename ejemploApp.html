<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmacia Santidad — Pedidos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --ink:#22304A; --muted:#8B94A6; --muted2:#5B6779;
    --gold:#2F6FC1; --gold-dark:#1E5AA8; --gold-deep:#174785;
    --gold-soft:#E3EDF9; --gold-pale:#CFE2F7;
    --cream:#FAFCFE; --cream2:#EFF4FA; --line:#E2E9F2; --line2:#D9E3EF; --wa:#25D366; --wa-dark:#1DA851;
    --sky:#E9F2FB; --sky-ink:#4A78A8;
    --ok-bg:#E5F3EA; --ok-fg:#2E7D4F;
    --warn-bg:#FDF3D7; --warn-fg:#8A6D1A;
    --bad-bg:#FBE7E4; --bad-fg:#C0392B;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#E4EAF2}
  body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink)}
  a{color:var(--gold-dark);text-decoration:none}
  a:hover{color:var(--gold-deep)}
  input,select,button{font-family:inherit}
  input:focus,select:focus{outline:none}
  ::-webkit-scrollbar{display:none}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,16px)}to{opacity:1;transform:translate(-50%,0)}}
  @keyframes popIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}

  .app-wrap{min-height:100vh;display:flex;justify-content:center}
  .app{width:100%;max-width:430px;background:linear-gradient(180deg,var(--cream) 0%,var(--cream2) 100%);
    min-height:100vh;display:flex;flex-direction:column;position:relative;box-shadow:0 0 48px rgba(34,48,74,.10)}

  /* ---- Header ---- */
  header{position:sticky;top:0;z-index:40;background:rgba(250,252,254,.88);backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(30,90,168,.18);
    padding:10px 16px 9px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px}
  .brand-mark{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--gold) 0%,var(--gold-dark) 100%);
    display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(30,90,168,.35);color:#fff;font-size:18px}
  .brand-name{font-weight:800;font-size:18px;line-height:1.1;display:block;letter-spacing:-.01em}
  .brand-sub{font-size:9px;font-weight:700;letter-spacing:.28em;color:var(--gold-dark)}
  .bell{width:38px;height:38px;border-radius:50%;border:1px solid var(--line2);background:#fff;color:var(--ink);
    cursor:pointer;position:relative;transition:box-shadow .2s;font-size:15px}
  .bell:hover{box-shadow:0 4px 14px rgba(34,48,74,.14)}
  .bell::after{content:'';position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;
    background:var(--bad-fg);border:1.5px solid #fff}

  main{flex:1;padding-bottom:90px}
  .screen{padding:14px 16px 0;animation:fadeUp .35s ease both}
  .screen[hidden]{display:none}
  h1.title{margin:0 0 4px;font-size:21px;font-weight:800;letter-spacing:-.02em}
  .subtitle{margin:0 0 16px;font-size:12px;color:var(--muted)}

  /* ---- Buscador ---- */
  .search-box{position:relative;z-index:30}
  .search{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid var(--line2);
    border-radius:14px;padding:10px 12px;transition:border-color .25s,box-shadow .25s}
  .search:focus-within{border-color:var(--gold);box-shadow:0 0 0 4px rgba(47,111,193,.14)}
  .search i{color:var(--gold-dark);font-size:14px}
  .search input{flex:1;border:none;background:transparent;font-size:14px;font-weight:500;color:var(--ink)}
  .suggest{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border:1px solid var(--line);
    border-radius:16px;box-shadow:0 18px 40px rgba(34,48,74,.16);overflow:hidden;animation:popIn .18s ease both}
  .suggest button{display:flex;align-items:center;gap:12px;width:100%;padding:10px 14px;background:none;border:none;
    border-bottom:1px solid #EAF0F7;cursor:pointer;text-align:left;transition:background .15s}
  .suggest button:hover{background:#F0F5FB}
  .thumb{width:38px;height:38px;border-radius:10px;background:var(--sky);display:flex;align-items:center;
    justify-content:center;flex-shrink:0;color:var(--sky-ink);font-size:15px}
  .s-name{margin:0;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .s-cat{margin:0;font-size:11px;color:var(--muted)}
  .s-price{font-size:12.5px;font-weight:700;color:var(--gold-dark);margin-left:auto;flex-shrink:0}

  /* ---- Banner ofertas ---- */
  .banner{display:flex;align-items:center;gap:14px;width:100%;margin-top:14px;padding:13px 14px;border:none;
    border-radius:20px;background:linear-gradient(120deg,#22304A 0%,#31456B 70%,#3D557F 100%);color:#fff;
    cursor:pointer;text-align:left;box-shadow:0 10px 26px rgba(34,48,74,.28);transition:transform .2s,box-shadow .2s}
  .banner:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(34,48,74,.34)}
  .banner .b-ico{width:44px;height:44px;border-radius:14px;background:rgba(47,111,193,.18);
    border:1px solid rgba(47,111,193,.45);display:flex;align-items:center;justify-content:center;
    flex-shrink:0;color:#9CC4F0;font-size:18px}
  .banner .b-title{margin:0;font-size:15.5px;font-weight:800;color:var(--gold-pale)}
  .banner .b-sub{margin:2px 0 0;font-size:11.5px;color:rgba(255,255,255,.75)}
  .banner .fa-chevron-right{color:#9CC4F0;font-size:13px;margin-left:auto}

  .row-head{display:flex;align-items:baseline;justify-content:space-between;margin:16px 0 8px}
  .row-head h2{margin:0;font-size:14.5px;font-weight:700}
  .row-head a{font-size:11.5px;font-weight:600;cursor:pointer}

  /* ---- Categorías inicio ---- */
  .cats{display:flex;gap:10px;overflow-x:auto;padding:0 18px 4px;margin:0 -18px}
  .cat-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:7px;background:none;border:none;
    cursor:pointer;padding:0;width:66px}
  .cat-btn .c-ico{width:52px;height:52px;border-radius:16px;background:#fff;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;transition:border-color .2s,box-shadow .2s,transform .2s;
    color:var(--sky-ink);font-size:20px}
  .cat-btn:hover .c-ico{border-color:var(--gold);box-shadow:0 6px 16px rgba(30,90,168,.18);transform:translateY(-2px)}
  .cat-btn span{font-size:10.5px;font-weight:600;color:var(--muted2);text-align:center;line-height:1.2}

  /* ---- Ofertas carrusel ---- */
  .offers{display:flex;gap:12px;overflow-x:auto;margin:0 -18px;padding:2px 18px 8px}
  .offer{flex-shrink:0;width:156px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:14px;
    position:relative;transition:box-shadow .2s,transform .2s}
  .offer:hover{box-shadow:0 12px 28px rgba(34,48,74,.14);transform:translateY(-3px)}
  .off-tag{position:absolute;top:12px;right:12px;background:var(--bad-fg);color:#fff;font-size:10px;font-weight:700;
    padding:3px 8px;border-radius:999px}
  .offer .thumb{width:52px;height:52px;border-radius:14px;font-size:20px;margin-bottom:10px}
  .off-name{margin:0 0 2px;font-size:13px;font-weight:700;line-height:1.25;min-height:33px}
  .off-price{margin:0 0 10px;font-size:11px;color:var(--muted)}
  .off-price b{color:var(--gold-dark);font-weight:800;font-size:13.5px;margin-left:6px}
  .btn-soft{width:100%;padding:9px 0;border:none;border-radius:12px;background:var(--gold-soft);color:var(--gold-deep);
    font-size:11.5px;font-weight:700;cursor:pointer;transition:background .2s,color .2s}
  .btn-soft:hover{background:var(--gold);color:#fff}

  /* ---- Accesos rápidos ---- */
  .quick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .quick button{display:flex;flex-direction:column;gap:6px;padding:13px;border-radius:20px;cursor:pointer;
    text-align:left;transition:transform .2s,box-shadow .2s;border:none;font-family:inherit}
  .quick button:hover{transform:translateY(-2px)}
  .q-gold{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-dark) 100%);color:#fff;
    box-shadow:0 10px 24px rgba(30,90,168,.32)}
  .q-white{background:#fff;color:var(--ink);border:1px solid var(--line) !important}
  .q-white:hover{box-shadow:0 10px 24px rgba(34,48,74,.12)}
  .quick i{font-size:20px}
  .q-white i{color:var(--sky-ink)}
  .q-t{font-size:13px;font-weight:700}
  .q-s{font-size:10.5px;opacity:.85}
  .q-white .q-s{color:var(--muted);opacity:1}

  /* ---- Chips ---- */
  .chips{display:flex;gap:8px;overflow-x:auto;margin:0 -18px 14px;padding:2px 18px}
  .chip{flex-shrink:0;padding:7px 14px;border-radius:999px;border:1px solid var(--line2);background:#fff;
    color:var(--muted2);font-size:11.5px;font-weight:700;cursor:pointer;transition:all .2s}
  .chip.on{background:var(--ink);color:var(--gold-pale);border-color:var(--ink)}

  /* ---- Producto ---- */
  .plist{display:flex;flex-direction:column;gap:8px}
  .prod{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px 12px;transition:box-shadow .2s}
  .prod:hover{box-shadow:0 10px 24px rgba(34,48,74,.10)}
  .p-row{display:flex;align-items:center;gap:12px}
  .prod .thumb{width:52px;height:52px;border-radius:14px;font-size:19px}
  .p-info{flex:1;min-width:0}
  .p-name-row{display:flex;align-items:center;gap:6px}
  .p-name{margin:0;font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .p-tag{background:var(--bad-fg);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:999px;flex-shrink:0}
  .p-meta{margin:2px 0 0;font-size:11px;color:var(--muted)}
  .p-price-row{display:flex;align-items:center;gap:8px;margin-top:5px}
  .p-price{font-size:14px;font-weight:800;color:var(--gold-dark)}
  .stock-chip{font-size:10px;font-weight:700;padding:2.5px 8px;border-radius:999px}
  .st-ok{background:var(--ok-bg);color:var(--ok-fg)}
  .st-low{background:var(--warn-bg);color:var(--warn-fg)}
  .st-out{background:var(--bad-bg);color:var(--bad-fg)}
  .p-add{width:40px;height:40px;border-radius:13px;border:none;background:var(--gold-soft);color:var(--gold-deep);
    font-size:15px;cursor:pointer;flex-shrink:0;transition:background .2s,color .2s,transform .15s}
  .p-add:hover{background:var(--gold);color:#fff;transform:scale(1.06)}
  .p-add:active{transform:scale(.94)}
  .p-stock-toggle{display:flex;align-items:center;gap:6px;margin-top:10px;background:none;border:none;padding:0;
    font-size:11px;font-weight:700;color:var(--sky-ink);cursor:pointer}
  .p-stock-toggle .fa-chevron-down,.p-stock-toggle .fa-chevron-up{font-size:9px}
  .p-stock{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px;display:flex;flex-direction:column;
    gap:7px;animation:popIn .2s ease both}
  .p-stock div{display:flex;align-items:center;justify-content:space-between;font-size:12px}
  .p-stock span:first-child{color:var(--muted2);font-weight:600}
  .p-stock span:last-child{font-weight:800}
  .empty{text-align:center;padding:44px 20px;color:var(--muted)}
  .empty i{font-size:28px;margin-bottom:10px;display:block}
  .empty p{margin:0;font-size:13px;font-weight:600}

  /* ---- Formulario pedido ---- */
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;display:flex;
    flex-direction:column;gap:11px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--muted)}
  .field select,.field input{padding:10px 12px;border:1.5px solid var(--line2);border-radius:14px;background:var(--cream);
    font-size:13.5px;font-weight:600;color:var(--ink);transition:border-color .25s,box-shadow .25s;appearance:none}
  .field input{font-weight:500}
  .field select:focus,.field input:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(47,111,193,.14)}
  .prio{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .prio button{padding:11px 0;border-radius:14px;border:1.5px solid var(--line2);background:var(--cream);
    color:var(--muted2);font-size:12.5px;font-weight:700;cursor:pointer;transition:all .2s}
  .prio button.on-normal{background:var(--ink);color:var(--gold-pale);border-color:var(--ink)}
  .prio button.on-urgente{background:var(--bad-fg);color:#fff;border-color:var(--bad-fg)}
  h2.sec{margin:20px 0 10px;font-size:14.5px;font-weight:700}
  .cart-empty{text-align:center;padding:30px 20px;background:#fff;border:1.5px dashed #C9D9EE;border-radius:20px;color:var(--muted)}
  .cart-empty i{font-size:26px;color:#BCD2EC;display:block;margin-bottom:10px}
  .cart-empty p{margin:0 0 12px;font-size:12.5px;font-weight:600}
  .btn-ink{padding:10px 18px;border:none;border-radius:12px;background:var(--ink);color:#fff;font-size:12px;
    font-weight:700;cursor:pointer;transition:background .2s}
  .btn-ink:hover{background:#31456B}
  .cart-list{display:flex;flex-direction:column;gap:8px}
  .cart-item{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:16px;
    padding:11px 13px;animation:popIn .2s ease both}
  .cart-item .thumb{width:40px;height:40px;border-radius:11px}
  .ci-name{margin:0;font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ci-sub{margin:1px 0 0;font-size:11px;color:var(--gold-dark);font-weight:700}
  .qty-ctl{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .qty-ctl button{width:28px;height:28px;border-radius:9px;border:1px solid var(--line2);background:var(--cream);
    color:var(--ink);cursor:pointer;font-size:12px;transition:background .15s}
  .qty-ctl button:hover{background:var(--gold-soft)}
  .qty-ctl b{font-size:13px;font-weight:800;min-width:18px;text-align:center}
  .total-card{margin-top:14px;background:var(--ink);border-radius:20px;padding:16px 18px;color:#fff}
  .total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .total-row span:first-child{font-size:12px;color:rgba(255,255,255,.7);font-weight:600}
  .total-row span:last-child{font-size:19px;font-weight:800;color:#9CC4F0}
  .btn-gold{width:100%;padding:14px 0;border:none;border-radius:14px;
    background:linear-gradient(135deg,var(--gold) 0%,var(--gold-dark) 100%);color:#fff;font-size:14px;font-weight:800;
    letter-spacing:.02em;cursor:pointer;box-shadow:0 8px 20px rgba(30,90,168,.4);transition:transform .15s,box-shadow .2s}
  .btn-gold:hover{transform:translateY(-1px);box-shadow:0 12px 26px rgba(30,90,168,.5)}
  .btn-gold:active{transform:scale(.98)}

  /* ---- Pedidos ---- */
  .pedidos{display:flex;flex-direction:column;gap:8px}
  .pedido{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px;
    animation:fadeUp .35s ease both;transition:box-shadow .2s}
  .pedido:hover{box-shadow:0 10px 24px rgba(34,48,74,.10)}
  .pd-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .pd-code{font-size:13.5px;font-weight:800}
  .pd-estado{font-size:10px;font-weight:800;padding:3px 9px;border-radius:999px;margin-left:10px}
  .pd-fecha{font-size:11px;color:var(--muted);font-weight:600}
  .pd-suc{margin:8px 0 0;font-size:12px;color:var(--muted2);font-weight:600}
  .pd-suc i{font-size:10px;color:var(--sky-ink);margin-right:6px}
  .pd-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;
    border-top:1px dashed var(--line)}
  .pd-items{font-size:12px;color:var(--muted);font-weight:600}
  .pd-total{font-size:15px;font-weight:800;color:var(--gold-dark)}
  .btn-recuperar{width:100%;margin-top:12px;padding:11px 0;border:none;border-radius:13px;background:var(--gold-soft);
    color:var(--gold-deep);font-size:12px;font-weight:800;cursor:pointer;transition:background .2s,color .2s}
  .btn-recuperar:hover{background:var(--gold);color:#fff}
  .pd-done{margin-top:12px;padding:10px 0;border-radius:13px;background:var(--ok-bg);color:var(--ok-fg);
    font-size:12px;font-weight:800;text-align:center}

  /* ---- Sucursales ---- */
  .sucs{display:flex;flex-direction:column;gap:10px}
  .suc{background:#fff;border:1px solid var(--line);border-radius:16px;padding:13px 14px;transition:box-shadow .2s}
  .suc:hover{box-shadow:0 10px 24px rgba(34,48,74,.10)}
  .suc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .suc-id{display:flex;align-items:center;gap:11px}
  .suc-id .thumb{width:42px;height:42px;border-radius:13px;font-size:17px}
  .suc-id p{margin:0;font-size:14px;font-weight:800}
  .suc-badge{font-size:9.5px;font-weight:800;padding:3px 9px;border-radius:999px;background:var(--ok-bg);color:var(--ok-fg)}
  .suc p.line{margin:0 0 5px;font-size:12px;color:var(--muted2)}
  .suc p.line:last-child{margin-bottom:0}
  .suc p.line i{width:16px;color:var(--gold-dark)}

  /* ---- Toast ---- */
  #toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:60;background:var(--ink);color:#fff;
    font-size:12.5px;font-weight:700;padding:12px 20px;border-radius:999px;box-shadow:0 14px 34px rgba(34,48,74,.35);
    white-space:nowrap;animation:toastIn .25s ease both;display:none}
  #toast i{color:#9CC4F0;margin-right:8px}

  /* ---- Nav ---- */
  nav{position:sticky;bottom:0;z-index:50;background:rgba(250,252,254,.94);backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(30,90,168,.18);display:flex;align-items:flex-end;padding:0 6px}
  nav button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;
    padding:9px 0 7px;cursor:pointer;color:#8FA0B8;transition:color .2s;position:relative}
  nav button i{font-size:17px}
  nav button span{font-size:9.5px;font-weight:700}
  nav button.on{color:var(--gold-dark)}
  .nav-fab{padding:0 0 9px !important}
  .fab{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--gold) 0%,var(--gold-dark) 100%);
    display:flex;align-items:center;justify-content:center;margin-top:-20px;box-shadow:0 8px 20px rgba(30,90,168,.45);
    border:3px solid var(--cream);transition:transform .2s}
  .nav-fab:hover .fab{transform:scale(1.07)}
  .fab i{font-size:18px;color:#fff !important}
  .fab-badge{position:absolute;top:-24px;right:14px;min-width:19px;height:19px;border-radius:999px;background:var(--bad-fg);
    color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 5px;
    border:2px solid var(--cream)}
  .nav-fab span{margin-top:4px}

  /* ---- Mapa & WhatsApp ---- */
  #map{height:230px;border-radius:16px;border:1px solid var(--line);margin-bottom:12px;position:relative;z-index:1}
  .suc-actions{display:flex;gap:8px;margin-top:11px}
  .btn-wa{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:10px 0;border:none;
    border-radius:12px;background:var(--wa);color:#fff;font-size:12px;font-weight:800;cursor:pointer;transition:background .2s}
  .btn-wa:hover{background:var(--wa-dark);color:#fff}
  .btn-wa i{font-size:15px}
  .btn-mapa{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:10px 0;border:none;
    border-radius:12px;background:var(--gold-soft);color:var(--gold-deep);font-size:12px;font-weight:800;cursor:pointer;
    transition:background .2s,color .2s;font-family:inherit}
  .btn-mapa:hover{background:var(--gold);color:#fff}
  .wa-float{position:fixed;bottom:86px;right:max(14px,calc(50% - 201px));z-index:55;width:52px;height:52px;
    border-radius:50%;background:var(--wa);color:#fff;border:none;font-size:24px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;box-shadow:0 10px 24px rgba(37,211,102,.45);transition:transform .2s}
  .wa-float:hover{transform:scale(1.08);color:#fff}
  .leaflet-popup-content{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px}
</style>
</head>
<body>
<div class="app-wrap">
  <div class="app">

    <header>
      <div class="brand">
        <div class="brand-mark"><i class="fa-solid fa-staff-snake"></i></div>
        <div>
          <span class="brand-name">Santidad</span>
          <span class="brand-sub">FARMACIA</span>
        </div>
      </div>
      <button class="bell" title="Notificaciones"><i class="fa-regular fa-bell"></i></button>
    </header>

    <main>
      <!-- INICIO -->
      <section class="screen" id="scr-inicio">
        <p class="subtitle" style="margin:0" id="saludo">Buenos días</p>
        <h1 class="title" style="font-size:22px;margin-bottom:12px">¿Qué necesitas pedir hoy?</h1>

        <div class="search-box">
          <div class="search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input id="search-inicio" placeholder="Buscar producto, categoría…" autocomplete="off">
          </div>
          <div class="suggest" id="suggest" hidden></div>
        </div>

        <button class="banner" onclick="App.goOfertas()">
          <div class="b-ico"><i class="fa-solid fa-tags"></i></div>
          <div>
            <p class="b-title">Sección de ofertas</p>
            <p class="b-sub">Hasta 20% de descuento esta semana</p>
          </div>
          <i class="fa-solid fa-chevron-right"></i>
        </button>

        <div class="row-head">
          <h2>Categorías</h2>
          <a onclick="App.go('productos','Todo')">Ver todo</a>
        </div>
        <div class="cats" id="cats"></div>

        <div class="row-head"><h2>Ofertas de la semana</h2></div>
        <div class="offers" id="offers"></div>

        <div class="quick">
          <button class="q-gold" onclick="App.go('pedido')">
            <i class="fa-solid fa-file-circle-plus"></i>
            <span class="q-t">Nuevo pedido</span>
            <span class="q-s">Solicita productos a la farmacia</span>
          </button>
          <button class="q-white" onclick="App.go('pedidos')">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span class="q-t">Mis pedidos</span>
            <span class="q-s">Recupera pedidos para vender</span>
          </button>
        </div>
      </section>

      <!-- PRODUCTOS -->
      <section class="screen" id="scr-productos" hidden>
        <h1 class="title" style="margin-bottom:12px">Productos</h1>
        <div class="search" style="margin-bottom:12px">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input id="search-productos" placeholder="Buscar en el inventario…" autocomplete="off">
        </div>
        <div class="chips" id="chips"></div>
        <div class="plist" id="plist"></div>
      </section>

      <!-- NUEVO PEDIDO -->
      <section class="screen" id="scr-pedido" hidden>
        <h1 class="title">Nuevo pedido</h1>
        <p class="subtitle">Solicita productos a la farmacia central</p>

        <div class="card">
          <div class="field">
            <label>SUCURSAL SOLICITANTE</label>
            <select id="f-sucursal">
              <option>Sucursal 6 de Octubre</option>
              <option>Sucursal Norte</option>
              <option>Central — C. Bolívar</option>
            </select>
          </div>
          <div class="field">
            <label>PRIORIDAD</label>
            <div class="prio">
              <button id="prio-normal" class="on-normal" onclick="App.setPrio('Normal')">Normal</button>
              <button id="prio-urgente" onclick="App.setPrio('Urgente')">Urgente</button>
            </div>
          </div>
          <div class="field">
            <label>OBSERVACIONES</label>
            <input id="f-obs" placeholder="Ej. Reposición semanal…">
          </div>
        </div>

        <h2 class="sec">Ítems del pedido</h2>
        <div id="cart-area"></div>
      </section>

      <!-- MIS PEDIDOS -->
      <section class="screen" id="scr-pedidos" hidden>
        <h1 class="title">Mis pedidos</h1>
        <p class="subtitle">Recupera un pedido para venderlo en caja</p>
        <div class="pedidos" id="pedidos"></div>
      </section>

      <!-- SUCURSALES -->
      <section class="screen" id="scr-sucursales" hidden>
        <h1 class="title">Sucursales</h1>
        <p class="subtitle">Tres puntos de atención en Oruro</p>
        <div id="map"></div>
        <div class="sucs" id="sucs"></div>
      </section>
    </main>

    <div id="toast"><i class="fa-solid fa-circle-check"></i><span id="toast-msg"></span></div>

    <a class="wa-float" href="https://wa.me/59172451810" target="_blank" rel="noopener" title="Escríbenos por WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>

    <nav>
      <button data-tab="inicio" class="on" onclick="App.go('inicio')">
        <i class="fa-solid fa-house"></i><span>Inicio</span>
      </button>
      <button data-tab="productos" onclick="App.go('productos')">
        <i class="fa-solid fa-pills"></i><span>Productos</span>
      </button>
      <button data-tab="pedido" class="nav-fab" onclick="App.go('pedido')">
        <div class="fab"><i class="fa-solid fa-basket-shopping"></i></div>
        <span class="fab-badge" id="cart-badge" hidden>0</span>
        <span>Pedido</span>
      </button>
      <button data-tab="pedidos" onclick="App.go('pedidos')">
        <i class="fa-solid fa-clipboard-list"></i><span>Pedidos</span>
      </button>
      <button data-tab="sucursales" onclick="App.go('sucursales')">
        <i class="fa-solid fa-store"></i><span>Sucursales</span>
      </button>
    </nav>
  </div>
</div>

<script>
/* ================== DATOS SIMULADOS (reemplazar con la API Laravel) ================== */
const PRODUCTS = [
  { id:1,  nombre:'Paracetamol 500 mg',          cat:'Analgésicos',     presentacion:'Caja x 100 tab', precio:12.5, stock:[120,45,0] },
  { id:2,  nombre:'Ibuprofeno 400 mg',           cat:'Analgésicos',     presentacion:'Caja x 50 tab',  precio:15.0, stock:[80,22,14] },
  { id:3,  nombre:'Amoxicilina 500 mg',          cat:'Antibióticos',    presentacion:'Caja x 21 cáp',  precio:28.0, stock:[40,8,5] },
  { id:4,  nombre:'Vitamina C 1 g efervescente', cat:'Vitaminas',       presentacion:'Tubo x 10',      precio:22.0, stock:[95,30,26], oferta:.15 },
  { id:5,  nombre:'Complejo B',                  cat:'Vitaminas',       presentacion:'Frasco x 60 cáp',precio:35.0, stock:[55,12,9] },
  { id:6,  nombre:'Loratadina 10 mg',            cat:'Antialérgicos',   presentacion:'Caja x 30 tab',  precio:9.5,  stock:[70,18,11] },
  { id:7,  nombre:'Omeprazol 20 mg',             cat:'Gastro',          presentacion:'Caja x 28 cáp',  precio:18.0, stock:[60,0,7] },
  { id:8,  nombre:'Sales de rehidratación oral', cat:'Pediátricos',     presentacion:'Sobre 20.5 g',   precio:6.0,  stock:[200,64,40] },
  { id:9,  nombre:'Alcohol en gel 250 ml',       cat:'Cuidado personal',presentacion:'Frasco',         precio:20.0, stock:[140,33,25], oferta:.2 },
  { id:10, nombre:'Jarabe para la tos adulto',   cat:'Respiratorio',    presentacion:'Frasco 120 ml',  precio:24.5, stock:[35,10,3] },
  { id:11, nombre:'Enterogermina 5 ml',          cat:'Gastro',          presentacion:'Caja x 10 amp',  precio:42.0, stock:[25,6,0] },
  { id:12, nombre:'Protector solar FPS 50',      cat:'Dermocosmética',  presentacion:'Tubo 60 g',      precio:89.0, stock:[18,4,2], oferta:.1 }
];
const CATS = [
  { name:'Analgésicos',      icon:'fa-solid fa-tablets' },
  { name:'Antibióticos',     icon:'fa-solid fa-capsules' },
  { name:'Vitaminas',        icon:'fa-solid fa-pills' },
  { name:'Antialérgicos',    icon:'fa-solid fa-shield-virus' },
  { name:'Gastro',           icon:'fa-solid fa-prescription-bottle-medical' },
  { name:'Respiratorio',     icon:'fa-solid fa-lungs' },
  { name:'Pediátricos',      icon:'fa-solid fa-baby' },
  { name:'Cuidado personal', icon:'fa-solid fa-pump-medical' },
  { name:'Dermocosmética',   icon:'fa-solid fa-sun' }
];
const SUC_NAMES = ['Central — C. Bolívar','Sucursal 6 de Octubre','Sucursal Norte'];
const SUCURSALES = [
  { nombre:'Central — C. Bolívar',   dir:'C. Bolívar Nº 550, entre Pagador y Potosí, Oruro', tel:'(2) 525 1810', wa:'59172451810', horario:'Lun–Sáb · 8:00–22:00', lat:-17.9608, lng:-67.1078 },
  { nombre:'Sucursal 6 de Octubre',  dir:'Av. 6 de Octubre Nº 1780, Oruro',                  tel:'(2) 525 4437', wa:'59172454437', horario:'Lun–Dom · 8:00–21:00', lat:-17.9702, lng:-67.1092 },
  { nombre:'Sucursal Norte',         dir:'Av. del Ejército Nº 215, Oruro',                   tel:'(2) 526 1190', wa:'59172461190', horario:'Lun–Sáb · 8:30–20:30', lat:-17.9469, lng:-67.1046 }
];
const UMBRAL_STOCK_BAJO = 20;

/* ================== ESTADO ================== */
const state = {
  tab: 'inicio',
  query: '',
  cat: 'Todo',
  cart: [],            // {id, qty}
  stockOpenId: null,
  prioridad: 'Normal',
  nextNum: 43,
  pedidos: [
    { codigo:'PED-0042', sucursal:'Sucursal 6 de Octubre', fecha:'Hoy 09:12',  items:3, total:156.5, estado:'Pendiente' },
    { codigo:'PED-0041', sucursal:'Sucursal Norte',      fecha:'Ayer 16:40', items:5, total:342.0, estado:'Enviado' },
    { codigo:'PED-0040', sucursal:'Sucursal 6 de Octubre', fecha:'07 Jul',     items:2, total:64.0,  estado:'Recuperado' }
  ]
};

/* ================== UTILIDADES ================== */
const $ = (sel) => document.querySelector(sel);
const fmt = (n) => 'Bs ' + n.toFixed(2);
const iconFor = (cat) => (CATS.find(c => c.name === cat) || {}).icon || 'fa-solid fa-pills';
const precioActual = (p) => p.oferta ? p.precio * (1 - p.oferta) : p.precio;
const esc = (t) => String(t).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

let toastTimer;
function toast(msg){
  $('#toast-msg').textContent = msg;
  const t = $('#toast');
  t.style.display = 'block';
  t.style.animation = 'none'; t.offsetHeight; t.style.animation = '';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display = 'none'; }, 2400);
}

/* ================== APP ================== */
const App = {
  go(tab, cat){
    state.tab = tab;
    state.query = '';
    if (cat) state.cat = cat;
    $('#search-inicio').value = '';
    $('#search-productos').value = '';
    $('#suggest').hidden = true;
    render();
    if (tab === 'sucursales') ensureMap();
  },
  goOfertas(){ this.go('productos','Ofertas'); },
  verMapa(i){
    const su = SUCURSALES[i];
    if (!map) ensureMap();
    setTimeout(() => { map.setView([su.lat, su.lng], 16); markers[i].openPopup(); }, 80);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  },
  setPrio(p){
    state.prioridad = p;
    $('#prio-normal').className  = p === 'Normal'  ? 'on-normal'  : '';
    $('#prio-urgente').className = p === 'Urgente' ? 'on-urgente' : '';
  },
  addToCart(id){
    const ex = state.cart.find(i => i.id === id);
    if (ex) ex.qty += 1; else state.cart.push({ id, qty:1 });
    toast('Añadido al pedido');
    renderCart(); renderBadge();
  },
  changeQty(id, d){
    const it = state.cart.find(i => i.id === id);
    if (!it) return;
    it.qty += d;
    if (it.qty <= 0) state.cart = state.cart.filter(i => i.id !== id);
    renderCart(); renderBadge();
  },
  toggleStock(id){
    state.stockOpenId = state.stockOpenId === id ? null : id;
    renderProductos();
  },
  setCat(name){ state.cat = name; renderProductos(); },
  recuperar(codigo){
    const pd = state.pedidos.find(p => p.codigo === codigo);
    if (pd) pd.estado = 'Recuperado';
    toast('Pedido ' + codigo + ' recuperado para venta');
    renderPedidos();
  },
  registrar(){
    if (!state.cart.length) return;
    const total = state.cart.reduce((t,i) => t + precioActual(PRODUCTS.find(p => p.id === i.id)) * i.qty, 0);
    state.pedidos.unshift({
      codigo: 'PED-00' + state.nextNum++,
      sucursal: $('#f-sucursal').value,
      fecha: 'Hoy — recién creado',
      items: state.cart.reduce((t,i) => t + i.qty, 0),
      total,
      estado: state.prioridad === 'Urgente' ? 'Urgente' : 'Pendiente'
    });
    state.cart = [];
    $('#f-obs').value = '';
    toast('Pedido ' + state.pedidos[0].codigo + ' registrado');
    this.go('pedidos');
  }
};

/* ================== RENDER ================== */
function renderNav(){
  document.querySelectorAll('nav button').forEach(b => {
    b.classList.toggle('on', b.dataset.tab === state.tab);
  });
}
function renderScreens(){
  ['inicio','productos','pedido','pedidos','sucursales'].forEach(t => {
    const el = $('#scr-' + t);
    el.hidden = state.tab !== t;
    if (state.tab === t) { el.style.animation = 'none'; el.offsetHeight; el.style.animation = ''; }
  });
}
function renderBadge(){
  const n = state.cart.reduce((t,i) => t + i.qty, 0);
  const b = $('#cart-badge');
  b.hidden = n === 0;
  b.textContent = n;
}
function renderCats(){
  $('#cats').innerHTML = CATS.slice(0,8).map(c => `
    <button class="cat-btn" onclick="App.go('productos','${esc(c.name)}')">
      <div class="c-ico"><i class="${c.icon}"></i></div>
      <span>${esc(c.name)}</span>
    </button>`).join('');
}
function renderOffers(){
  $('#offers').innerHTML = PRODUCTS.filter(p => p.oferta).map(p => `
    <div class="offer">
      <span class="off-tag">-${Math.round(p.oferta*100)}%</span>
      <div class="thumb"><i class="${iconFor(p.cat)}"></i></div>
      <p class="off-name">${esc(p.nombre)}</p>
      <p class="off-price"><s>${fmt(p.precio)}</s><b>${fmt(precioActual(p))}</b></p>
      <button class="btn-soft" onclick="App.addToCart(${p.id})"><i class="fa-solid fa-plus" style="margin-right:6px"></i>Añadir al pedido</button>
    </div>`).join('');
}
function renderChips(){
  const names = ['Todo','Ofertas', ...CATS.map(c => c.name)];
  $('#chips').innerHTML = names.map(n => `
    <button class="chip ${state.cat === n ? 'on' : ''}" onclick="App.setCat('${esc(n)}')">${esc(n)}</button>`).join('');
}
function stockChip(total){
  if (total === 0)               return '<span class="stock-chip st-out">Agotado</span>';
  if (total < UMBRAL_STOCK_BAJO) return `<span class="stock-chip st-low">Stock bajo: ${total}</span>`;
  return `<span class="stock-chip st-ok">En stock: ${total}</span>`;
}
function renderProductos(){
  renderChips();
  const q = state.query.trim().toLowerCase();
  let lista = PRODUCTS;
  if (state.cat === 'Ofertas') lista = lista.filter(p => p.oferta);
  else if (state.cat !== 'Todo') lista = lista.filter(p => p.cat === state.cat);
  if (q.length >= 2) lista = lista.filter(p => (p.nombre + ' ' + p.cat).toLowerCase().includes(q));

  if (!lista.length){
    $('#plist').innerHTML = `<div class="empty"><i class="fa-regular fa-face-frown"></i><p>Sin resultados para tu búsqueda</p></div>`;
    return;
  }
  $('#plist').innerHTML = lista.map(p => {
    const total = p.stock.reduce((a,b) => a+b, 0);
    const open = state.stockOpenId === p.id;
    const rows = p.stock.map((qty,i) => {
      const color = qty === 0 ? 'var(--bad-fg)' : (qty < UMBRAL_STOCK_BAJO ? 'var(--warn-fg)' : 'var(--ok-fg)');
      return `<div><span>${esc(SUC_NAMES[i])}</span><span style="color:${color}">${qty === 0 ? 'Sin stock' : qty + ' und'}</span></div>`;
    }).join('');
    return `
    <div class="prod">
      <div class="p-row">
        <div class="thumb"><i class="${iconFor(p.cat)}"></i></div>
        <div class="p-info">
          <div class="p-name-row">
            <p class="p-name">${esc(p.nombre)}</p>
            ${p.oferta ? `<span class="p-tag">-${Math.round(p.oferta*100)}%</span>` : ''}
          </div>
          <p class="p-meta">${esc(p.cat)} · ${esc(p.presentacion)}</p>
          <div class="p-price-row">
            <span class="p-price">${fmt(precioActual(p))}</span>
            ${stockChip(total)}
          </div>
        </div>
        <button class="p-add" title="Añadir al pedido" onclick="App.addToCart(${p.id})"><i class="fa-solid fa-plus"></i></button>
      </div>
      <button class="p-stock-toggle" onclick="App.toggleStock(${p.id})">
        <i class="fa-solid fa-store" style="font-size:10px"></i>
        ${open ? 'Ocultar' : 'Ver'} stock por sucursal
        <i class="fa-solid fa-chevron-${open ? 'up' : 'down'}"></i>
      </button>
      ${open ? `<div class="p-stock">${rows}</div>` : ''}
    </div>`;
  }).join('');
}
function renderCart(){
  const area = $('#cart-area');
  if (!state.cart.length){
    area.innerHTML = `
      <div class="cart-empty">
        <i class="fa-solid fa-basket-shopping"></i>
        <p>Aún no añadiste productos</p>
        <button class="btn-ink" onclick="App.go('productos','Todo')">Explorar productos</button>
      </div>`;
    return;
  }
  const total = state.cart.reduce((t,i) => t + precioActual(PRODUCTS.find(p => p.id === i.id)) * i.qty, 0);
  area.innerHTML = `
    <div class="cart-list">
      ${state.cart.map(i => {
        const p = PRODUCTS.find(x => x.id === i.id);
        return `
        <div class="cart-item">
          <div class="thumb"><i class="${iconFor(p.cat)}"></i></div>
          <div style="flex:1;min-width:0">
            <p class="ci-name">${esc(p.nombre)}</p>
            <p class="ci-sub">${fmt(precioActual(p) * i.qty)}</p>
          </div>
          <div class="qty-ctl">
            <button onclick="App.changeQty(${p.id},-1)"><i class="fa-solid fa-minus"></i></button>
            <b>${i.qty}</b>
            <button onclick="App.changeQty(${p.id},1)"><i class="fa-solid fa-plus"></i></button>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="total-card">
      <div class="total-row"><span>Total estimado</span><span>${fmt(total)}</span></div>
      <button class="btn-gold" onclick="App.registrar()"><i class="fa-solid fa-paper-plane" style="margin-right:8px"></i>Registrar pedido</button>
    </div>`;
}
function renderPedidos(){
  const ESTILOS = {
    Pendiente:  ['var(--warn-bg)','var(--warn-fg)'],
    Urgente:    ['var(--bad-bg)','var(--bad-fg)'],
    Enviado:    ['#E3F2FD','#2A5B8F'],
    Recuperado: ['var(--ok-bg)','var(--ok-fg)']
  };
  $('#pedidos').innerHTML = state.pedidos.map(pd => {
    const [bg,fg] = ESTILOS[pd.estado] || ESTILOS.Pendiente;
    return `
    <div class="pedido">
      <div class="pd-top">
        <div>
          <span class="pd-code">${esc(pd.codigo)}</span>
          <span class="pd-estado" style="background:${bg};color:${fg}">${esc(pd.estado)}</span>
        </div>
        <span class="pd-fecha">${esc(pd.fecha)}</span>
      </div>
      <p class="pd-suc"><i class="fa-solid fa-store"></i>${esc(pd.sucursal)}</p>
      <div class="pd-foot">
        <span class="pd-items">${pd.items} ${pd.items === 1 ? 'ítem' : 'ítems'}</span>
        <span class="pd-total">${fmt(pd.total)}</span>
      </div>
      ${pd.estado === 'Recuperado'
        ? `<div class="pd-done"><i class="fa-solid fa-circle-check" style="margin-right:7px"></i>Recuperado — listo en caja</div>`
        : `<button class="btn-recuperar" onclick="App.recuperar('${esc(pd.codigo)}')"><i class="fa-solid fa-cash-register" style="margin-right:7px"></i>Recuperar para venta</button>`}
    </div>`;
  }).join('');
}
function renderSucursales(){
  $('#sucs').innerHTML = SUCURSALES.map((su,i) => `
    <div class="suc">
      <div class="suc-top">
        <div class="suc-id">
          <div class="thumb"><i class="fa-solid fa-house-medical"></i></div>
          <p>${esc(su.nombre)}</p>
        </div>
        <span class="suc-badge">ACTIVO</span>
      </div>
      <p class="line"><i class="fa-solid fa-location-dot"></i>${esc(su.dir)}</p>
      <p class="line"><i class="fa-solid fa-phone"></i>${esc(su.tel)}</p>
      <p class="line"><i class="fa-regular fa-clock"></i>${esc(su.horario)}</p>
      <div class="suc-actions">
        <a class="btn-wa" href="https://wa.me/${su.wa}" target="_blank" rel="noopener"><i class="fa-brands fa-whatsapp"></i>WhatsApp</a>
        <button class="btn-mapa" onclick="App.verMapa(${i})"><i class="fa-solid fa-map-location-dot"></i>Ver en mapa</button>
      </div>
    </div>`).join('');
}
function renderSuggest(){
  const q = state.query.trim().toLowerCase();
  const box = $('#suggest');
  if (q.length < 2){ box.hidden = true; return; }
  const list = PRODUCTS.filter(p => (p.nombre + ' ' + p.cat).toLowerCase().includes(q)).slice(0,5);
  if (!list.length){ box.hidden = true; return; }
  box.innerHTML = list.map(p => `
    <button onclick="App.go('productos','Todo'); state.query='${esc(p.nombre)}'; document.getElementById('search-productos').value='${esc(p.nombre)}'; renderProductos();">
      <div class="thumb"><i class="${iconFor(p.cat)}"></i></div>
      <div style="flex:1;min-width:0">
        <p class="s-name">${esc(p.nombre)}</p>
        <p class="s-cat">${esc(p.cat)}</p>
      </div>
      <span class="s-price">${fmt(precioActual(p))}</span>
    </button>`).join('');
  box.hidden = false;
}
let map = null, markers = [];
function ensureMap(){
  if (typeof L === 'undefined') return;
  if (map) { setTimeout(() => map.invalidateSize(), 60); return; }
  map = L.map('map', { scrollWheelZoom: false }).setView([-17.9605, -67.1075], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);
  SUCURSALES.forEach(su => {
    const m = L.circleMarker([su.lat, su.lng], {
      radius: 9, color: '#1E5AA8', weight: 2.5, fillColor: '#2F6FC1', fillOpacity: .85
    }).addTo(map);
    m.bindPopup('<b>' + su.nombre + '</b><br>' + su.dir);
    markers.push(m);
  });
  setTimeout(() => map.invalidateSize(), 60);
}

function render(){
  renderNav(); renderScreens(); renderBadge();
  renderCats(); renderOffers(); renderProductos();
  renderCart(); renderPedidos(); renderSucursales();
}

/* ================== EVENTOS ================== */
$('#search-inicio').addEventListener('input', e => { state.query = e.target.value; renderSuggest(); });
$('#search-productos').addEventListener('input', e => { state.query = e.target.value; renderProductos(); });
document.addEventListener('click', e => {
  if (!e.target.closest('.search-box')) $('#suggest').hidden = true;
});

const h = new Date().getHours();
$('#saludo').textContent = h < 12 ? 'Buenos días' : (h < 19 ? 'Buenas tardes' : 'Buenas noches');

render();
</script>
</body>
